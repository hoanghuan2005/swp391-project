services:
  # Backend - Spring Boot
  - type: web
    name: backend
    runtime: java21
    plan: free
    branch: main
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false # bạn sẽ set trong Render Dashboard

  # Frontend - React
  - type: web
    name: frontend
    runtime: node # Render hỗ trợ node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        sync: false # trỏ tới backend URL sau khi deploy
