services:
  # Backend - Spring Boot
  - type: web
    name: backend
    env: java
    plan: free
    branch: main
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false # bạn sẽ set trong Render Dashboard

  # Frontend - React
  - type: web
    name: frontend
    env: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        sync: false # trỏ tới backend URL sau khi deploy
