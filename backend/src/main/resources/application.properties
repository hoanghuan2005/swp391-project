spring.application.name=backend
server.port=8080

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:hoanghuan1005@gmail.com}
brevo.sender.name=${BREVO_SENDER_NAME:MinDoCu App}



app.jwt.secret=${JWT_SECRET_KEY:ZXhhbXBsZVNlY3JldEtleVRoYXRJc1ZlcnlMb25nQW5kU2VjdXJlRW5vdWdoVG9CZVVzZWRGb3JIUzUxMlNpZ25hdHVyZXNTb0l0TmVlZHNUb0JlQXRMZWFzdDY0Qnl0ZXM=}


groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

jina.api.key=${JINA_API_KEY}

vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:5173/payment/vnpay-return}
vnpay.ipn-url=${VNPAY_IPN_URL}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.messages.encoding=UTF-8
spring.jackson.serialization.fail-on-empty-beans=false

# Support HTTPS behind Render / Cloud Reverse Proxy
server.forward-headers-strategy=framework

# Dynamic Frontend URL for OAuth Callback & Email Links
app.frontend.url=${FRONTEND_URL:${APP_FRONTEND_URL:http://localhost:5173}}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://*.vercel.app,https://*.onrender.com}


spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:${APP_BACKEND_URL:http://localhost:8080}}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code



spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
